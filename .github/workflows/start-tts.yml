name: Start TTS Instance

# Permite prender la instancia Vast.ai desde GitHub Actions
# Util para activarla antes de una sesion de trabajo
on:
  workflow_dispatch:

jobs:
  start:
    name: Start Vast.ai Instance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Start instance
        env:
          VAST_API_KEY: ${{ secrets.VAST_API_KEY }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
        run: python scripts/vastai_control.py start
