name: Build & Push TTS Image

# Se ejecuta cuando hay cambios en el codigo del servicio TTS
# o manualmente desde la tab "Actions" de GitHub
on:
  push:
    branches: [main]
    paths:
      - 'tts/**'
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./tts
          file: ./tts/docker/Dockerfile
          push: true
          # La imagen queda publicada y lista para que Vast.ai la descargue
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pvc-tts:latest
          # Cache entre builds para no re-descargar el modelo cada vez
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/pvc-tts:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/pvc-tts:buildcache,mode=max
