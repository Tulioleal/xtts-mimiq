name: Build & Push TTS Image

on:
  push:
    branches:
      - main
    paths:
      - "tts/**"
      - ".github/workflows/build-tts.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./tts/docker/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pvc-tts:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/pvc-tts:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/pvc-tts:buildcache,mode=max
